networks:
  autoco-net:
    driver: bridge

volumes:
  redis-data:   # Volum per a Redis (persistència AOF)
  dp-keys:      # Claus de DataProtection del web (antiforgery, ProtectedLocalStorage)
  api-dp-keys:  # Claus de DataProtection de l'API
  api-backups:  # Còpies de seguretat JSON (exportació/importació)
  fotos-data:   # Fotos d'alumnes i professors (compartit entre api i web)

# ── Base de dades ──────────────────────────────────────────────────────────────
# Per MSSQL intern (Docker): afegeix al .env →  COMPOSE_FILE=docker-compose.yml:docker-compose.db.yml
# Per MSSQL extern:          configura DB_CONNECTION al .env i no afegeixis COMPOSE_FILE.
# Per PostgreSQL:            DB_PROVIDER=PostgreSQL + DB_CONNECTION=Host=...
# Consulta .env.example per a exemples de connexió.

services:

  redis:
    image: redis:7-alpine
    container_name: autoco-redis
    command: redis-server --appendonly yes --maxmemory 128mb --maxmemory-policy volatile-lru
    expose:
      - "6379"
    volumes:
      - redis-data:/data
    networks:
      - autoco-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout:  5s
      retries:  5
    restart: unless-stopped

  api:
    build:
      context:    .
      dockerfile: api/Dockerfile
    container_name: autoco-api
    environment:
      TZ:                              Europe/Madrid
      ASPNETCORE_ENVIRONMENT:          Production
      DOTNET_USE_POLLING_FILE_WATCHER: "true"
      DB_PROVIDER:                     "${DB_PROVIDER:-SqlServer}"
      ConnectionStrings__DefaultConnection: "${DB_CONNECTION}"
      JwtSettings__Secret:               "${JWT_SECRET}"
      JwtSettings__ExpiryHours:          "${JWT_EXPIRY_HOURS}"
      JwtSettings__RefreshExpiryHours:   "${JWT_REFRESH_EXPIRY_HOURS:-1}"
      Admin__Email:                 "${ADMIN_EMAIL}"
      Admin__Password:              "${ADMIN_PASSWORD}"
      Admin__Nom:                   "${ADMIN_NOM}"
      Admin__Cognoms:               "${ADMIN_COGNOMS}"
      Smtp__Host:                   "${SMTP_HOST}"
      Smtp__Port:                   "${SMTP_PORT}"
      Smtp__Username:               "${SMTP_USERNAME}"
      Smtp__Password:               "${SMTP_PASSWORD}"
      Smtp__FromAddress:            "${SMTP_FROM_ADDRESS}"
      Smtp__FromName:               "${SMTP_FROM_NAME}"
      App__WebUrl:                  "${APP_WEB_URL}"
      Redis__ConnectionString:      "redis:6379"
      Backup__Enabled:              "${BACKUP_ENABLED:-false}"
      Backup__DailyHour:            "${BACKUP_DAILY_HOUR:-2}"
      Backup__WeeklyDay:            "${BACKUP_WEEKLY_DAY:-0}"
      Backup__DailyRetention:       "${BACKUP_DAILY_RETENTION:-7}"
      Backup__WeeklyRetention:      "${BACKUP_WEEKLY_RETENTION:-4}"
    expose:
      - "8080"
    volumes:
      - api-dp-keys:/app/dp-keys
      - api-backups:/app/backups
      - fotos-data:/app/fotos
      - ./config/logging.json:/app/logging.json:ro
    networks:
      - autoco-net
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s
    restart: unless-stopped

  web:
    build:
      context:    .
      dockerfile: web/Dockerfile
    container_name: autoco-web
    environment:
      TZ:                              Europe/Madrid
      ASPNETCORE_ENVIRONMENT:          Production
      DOTNET_USE_POLLING_FILE_WATCHER: "true"
      ApiSettings__BaseUrl:            "http://api:8080"
      Redis__ConnectionString:         "redis:6379"
      DEFAULT_LANGUAGE:                "${DEFAULT_LANGUAGE:-ca}"
      BRAND_APP_NAME:                  "${BRAND_APP_NAME:-AutoCo Avaluació}"
      BRAND_APP_SHORT_NAME:            "${BRAND_APP_SHORT_NAME:-AutoCo}"
      BRAND_ORG_NAME:                  "${BRAND_ORG_NAME:-Salesians de Sarrià}"
      BRAND_ORG_DEPT:                  "${BRAND_ORG_DEPT:-Dept. d'Informàtica}"
      BRAND_PRIMARY_COLOR:             "${BRAND_PRIMARY_COLOR:-#CC0000}"
      BRAND_NAV_COLOR:                 "${BRAND_NAV_COLOR:-#1e293b}"
    volumes:
      - dp-keys:/app/dp-keys
      - fotos-data:/app/wwwroot/fotos
      - ./config/logging.json:/app/logging.json:ro
      - ./config/i18n:/app/i18n:ro
      - ./config/branding:/app/wwwroot/branding:ro
    networks:
      - autoco-net
    depends_on:
      api:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  nginx:
    build:
      context:    ./nginx
      dockerfile: Dockerfile
    container_name: autoco-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/ssl:/etc/nginx/ssl
    networks:
      - autoco-net
    depends_on:
      - web
    restart: unless-stopped
