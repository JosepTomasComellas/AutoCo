networks:
  autoco-net:
    driver: bridge

volumes:
  db-data:      # Volum Docker per a SQL Server (NTFS via WSL2 no és compatible amb SQLPAL)
  redis-data:   # Volum per a Redis (persistència AOF)
  dp-keys:      # Claus de DataProtection (antiforgery, ProtectedLocalStorage)
  api-backups:  # Còpies de seguretat JSON (exportació/importació)
  fotos-data:   # Fotos d'alumnes i professors (compartit entre api i web)

services:

  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: autoco-db
    environment:
      ACCEPT_EULA:        "Y"
      MSSQL_SA_PASSWORD:  "${MSSQL_SA_PASSWORD}"
      MSSQL_PID:          "Express"
    expose:
      - "1433"
    volumes:
      - db-data:/var/opt/mssql
      - ./backups:/var/opt/mssql/backup   # Còpies de seguretat accessibles al sistema de fitxers
    networks:
      - autoco-net
    healthcheck:
      test: ["CMD", "/opt/mssql-tools18/bin/sqlcmd",
             "-S", "localhost", "-U", "sa", "-P", "${MSSQL_SA_PASSWORD}",
             "-Q", "SELECT 1", "-No"]
      interval: 10s
      timeout:  5s
      retries:  12
      start_period: 30s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: autoco-redis
    command: redis-server --appendonly yes --maxmemory 128mb --maxmemory-policy volatile-lru
    expose:
      - "6379"
    volumes:
      - redis-data:/data
    networks:
      - autoco-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout:  5s
      retries:  5
    restart: unless-stopped

  api:
    build:
      context:    .
      dockerfile: api/Dockerfile
    container_name: autoco-api
    environment:
      TZ:                              Europe/Madrid
      ASPNETCORE_ENVIRONMENT:          Production
      DOTNET_USE_POLLING_FILE_WATCHER: "true"
      ConnectionStrings__DefaultConnection: >
        Server=db;Database=AutoCoAvaluacio;
        User Id=sa;Password=${MSSQL_SA_PASSWORD};
        TrustServerCertificate=True
      JwtSettings__Secret:          "${JWT_SECRET}"
      JwtSettings__ExpiryHours:     "${JWT_EXPIRY_HOURS}"
      Admin__Email:                 "${ADMIN_EMAIL}"
      Admin__Password:              "${ADMIN_PASSWORD}"
      Admin__Nom:                   "${ADMIN_NOM}"
      Admin__Cognoms:               "${ADMIN_COGNOMS}"
      Smtp__Host:                   "${SMTP_HOST}"
      Smtp__Port:                   "${SMTP_PORT}"
      Smtp__Username:               "${SMTP_USERNAME}"
      Smtp__Password:               "${SMTP_PASSWORD}"
      Smtp__FromAddress:            "${SMTP_FROM_ADDRESS}"
      Smtp__FromName:               "${SMTP_FROM_NAME}"
      App__WebUrl:                  "${APP_WEB_URL}"
      Redis__ConnectionString:      "redis:6379"
      Backup__Enabled:              "${BACKUP_ENABLED:-false}"
      Backup__DailyHour:            "${BACKUP_DAILY_HOUR:-2}"
      Backup__WeeklyDay:            "${BACKUP_WEEKLY_DAY:-0}"
      Backup__DailyRetention:       "${BACKUP_DAILY_RETENTION:-7}"
      Backup__WeeklyRetention:      "${BACKUP_WEEKLY_RETENTION:-4}"
    expose:
      - "8080"
    volumes:
      - api-backups:/app/backups
      - fotos-data:/app/fotos
      - ./config/logging.json:/app/logging.json:ro
    networks:
      - autoco-net
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s
    restart: unless-stopped

  web:
    build:
      context:    .
      dockerfile: web/Dockerfile
    container_name: autoco-web
    environment:
      TZ:                              Europe/Madrid
      ASPNETCORE_ENVIRONMENT:          Production
      DOTNET_USE_POLLING_FILE_WATCHER: "true"
      ApiSettings__BaseUrl:            "http://api:8080"
      Redis__ConnectionString:         "redis:6379"
    volumes:
      - dp-keys:/app/dp-keys
      - fotos-data:/app/wwwroot/fotos
      - ./config/logging.json:/app/logging.json:ro
    networks:
      - autoco-net
    depends_on:
      api:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  nginx:
    build:
      context:    ./nginx
      dockerfile: Dockerfile
    container_name: autoco-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/ssl:/etc/nginx/ssl
    networks:
      - autoco-net
    depends_on:
      - web
    restart: unless-stopped
