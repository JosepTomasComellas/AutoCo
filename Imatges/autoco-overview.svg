<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 420" width="960" height="420" font-family="Roboto,Segoe UI,Arial,sans-serif">

  <!-- Fons -->
  <rect width="960" height="420" fill="#f8fafc" rx="16"/>

  <!-- Títol -->
  <text x="480" y="38" text-anchor="middle" font-size="20" font-weight="700" fill="#1e293b">AutoCo — Flux d'avaluació entre iguals</text>
  <line x1="80" y1="50" x2="880" y2="50" stroke="#e2e8f0" stroke-width="1.5"/>

  <!-- ══════════════════════════════════════════════════════
       COLUMNA 1 — PROFESSOR (crear activitat + grups)
  ══════════════════════════════════════════════════════ -->
  <!-- Capçalera rol -->
  <rect x="50" y="68" width="200" height="32" rx="8" fill="#1e293b"/>
  <text x="150" y="89" text-anchor="middle" font-size="13" font-weight="600" fill="white">👤 Professor</text>

  <!-- Caixa Activitat -->
  <rect x="50" y="112" width="200" height="72" rx="10" fill="white" stroke="#CC0000" stroke-width="2"/>
  <text x="150" y="134" text-anchor="middle" font-size="12" font-weight="700" fill="#CC0000">Nova activitat</text>
  <text x="150" y="152" text-anchor="middle" font-size="11" fill="#475569">Nom · Descripció</text>
  <text x="150" y="169" text-anchor="middle" font-size="11" fill="#475569">Mòdul · Classe</text>

  <!-- Caixa Grups DnD -->
  <rect x="50" y="200" width="200" height="96" rx="10" fill="white" stroke="#CC0000" stroke-width="2"/>
  <text x="150" y="222" text-anchor="middle" font-size="12" font-weight="700" fill="#CC0000">Assignació de grups</text>

  <!-- Mini DnD visual -->
  <rect x="62" y="230" width="78" height="55" rx="6" fill="#fff7ed" stroke="#fed7aa" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="101" y="247" text-anchor="middle" font-size="9" fill="#92400e" font-weight="600">Sense grup</text>
  <rect x="68" y="252" width="66" height="14" rx="4" fill="#fed7aa"/>
  <text x="101" y="263" text-anchor="middle" font-size="8" fill="#78350f">≡ Alumne A</text>
  <rect x="68" y="269" width="66" height="14" rx="4" fill="#fed7aa"/>
  <text x="101" y="280" text-anchor="middle" font-size="8" fill="#78350f">≡ Alumne B</text>

  <text x="150" y="260" text-anchor="middle" font-size="16" fill="#94a3b8">→</text>

  <rect x="162" y="230" width="78" height="55" rx="6" fill="#f0fdf4" stroke="#86efac" stroke-width="1.5"/>
  <text x="201" y="247" text-anchor="middle" font-size="9" fill="#166534" font-weight="600">Grup 1</text>
  <rect x="168" y="252" width="66" height="14" rx="4" fill="#bbf7d0"/>
  <text x="201" y="263" text-anchor="middle" font-size="8" fill="#14532d">≡ Alumne A</text>
  <rect x="168" y="269" width="66" height="14" rx="4" fill="#bbf7d0"/>
  <text x="201" y="280" text-anchor="middle" font-size="8" fill="#14532d">≡ Alumne B</text>

  <!-- Caixa Toggle obrir/tancar -->
  <rect x="50" y="310" width="200" height="44" rx="10" fill="white" stroke="#16a34a" stroke-width="2"/>
  <text x="150" y="332" text-anchor="middle" font-size="12" font-weight="700" fill="#16a34a">🔓 Obrir activitat</text>
  <text x="150" y="347" text-anchor="middle" font-size="10" fill="#475569">Els alumnes ja poden avaluar</text>

  <!-- Fletxa 1→2 -->
  <line x1="250" y1="230" x2="310" y2="230" stroke="#94a3b8" stroke-width="2" marker-end="url(#arr)"/>

  <!-- ══════════════════════════════════════════════════════
       COLUMNA 2 — ALUMNE (formulari avaluació)
  ══════════════════════════════════════════════════════ -->
  <rect x="310" y="68" width="340" height="32" rx="8" fill="#0ea5e9"/>
  <text x="480" y="89" text-anchor="middle" font-size="13" font-weight="600" fill="white">👥 Alumnes — Formulari d'avaluació</text>

  <rect x="310" y="112" width="340" height="246" rx="10" fill="white" stroke="#0ea5e9" stroke-width="2"/>

  <!-- Barra progrés -->
  <text x="325" y="132" font-size="10" fill="#64748b">Progrés: 8 / 10 criteris puntuats</text>
  <rect x="325" y="137" width="310" height="8" rx="4" fill="#e2e8f0"/>
  <rect x="325" y="137" width="248" height="8" rx="4" fill="#0ea5e9"/>

  <!-- Alumne 1 (autoavaluació) -->
  <rect x="320" y="155" width="320" height="88" rx="8" fill="#fef2f2" stroke="#CC0000" stroke-width="1.5"/>
  <circle cx="342" cy="172" r="10" fill="#CC0000"/>
  <text x="342" y="176" text-anchor="middle" font-size="9" fill="white" font-weight="700">J</text>
  <text x="360" y="173" font-size="11" font-weight="700" fill="#1e293b">Joan Garcia</text>
  <rect x="820" y="163" width="0" height="0"/>
  <rect x="755" y="163" width="72" height="18" rx="9" fill="#CC0000"/>
  <text x="791" y="176" text-anchor="middle" font-size="9" fill="white" font-weight="600">Autoavaluació</text>

  <!-- Criteri 1 -->
  <text x="330" y="196" font-size="10" fill="#475569">Probitat</text>
  <text x="500" y="196" font-size="14" fill="#f59e0b">★★★★</text><text x="556" y="196" font-size="14" fill="#d1d5db">★</text>
  <rect x="580" y="183" width="22" height="16" rx="8" fill="#f59e0b"/>
  <text x="591" y="195" text-anchor="middle" font-size="9" fill="white" font-weight="700">B</text>

  <!-- Criteri 2 -->
  <text x="330" y="216" font-size="10" fill="#475569">Autonomia</text>
  <text x="500" y="216" font-size="14" fill="#f59e0b">★★★★★</text>
  <rect x="580" y="203" width="22" height="16" rx="8" fill="#f59e0b"/>
  <text x="591" y="215" text-anchor="middle" font-size="9" fill="white" font-weight="700">A</text>

  <!-- Criteri 3 -->
  <text x="330" y="236" font-size="10" fill="#475569">Col·laboració</text>
  <text x="500" y="236" font-size="14" fill="#d1d5db">★★★★★</text>
  <rect x="580" y="223" width="22" height="16" rx="8" fill="#e2e8f0"/>
  <text x="591" y="235" text-anchor="middle" font-size="9" fill="#64748b">–</text>

  <!-- Alumne 2 (coavaluació) -->
  <rect x="320" y="252" width="320" height="56" rx="8" fill="#f8fafc" stroke="#94a3b8" stroke-width="1.5"/>
  <circle cx="342" cy="268" r="10" fill="#64748b"/>
  <text x="342" y="272" text-anchor="middle" font-size="9" fill="white" font-weight="700">M</text>
  <text x="360" y="269" font-size="11" font-weight="700" fill="#1e293b">Maria Puig</text>
  <rect x="755" y="259" width="72" height="18" rx="9" fill="#64748b"/>
  <text x="791" y="272" text-anchor="middle" font-size="9" fill="white" font-weight="600">Coavaluació</text>
  <text x="330" y="293" font-size="10" fill="#475569">Probitat</text>
  <text x="500" y="293" font-size="14" fill="#f59e0b">★★★</text><text x="528" y="293" font-size="14" fill="#d1d5db">★★</text>
  <rect x="580" y="280" width="22" height="16" rx="8" fill="#f59e0b"/>
  <text x="591" y="292" text-anchor="middle" font-size="9" fill="white" font-weight="700">C</text>

  <!-- Botó guardar -->
  <rect x="320" y="318" width="320" height="34" rx="8" fill="#CC0000"/>
  <text x="480" y="340" text-anchor="middle" font-size="13" font-weight="700" fill="white">Guardar avaluació</text>

  <!-- Llegenda escala -->
  <text x="325" y="360" font-size="9" fill="#94a3b8">★ E(1) · ★★ D(3.5) · ★★★ C(5) · ★★★★ B(7.5) · ★★★★★ A(10)</text>

  <!-- Fletxa 2→3 -->
  <line x1="650" y1="230" x2="710" y2="230" stroke="#94a3b8" stroke-width="2" marker-end="url(#arr)"/>

  <!-- ══════════════════════════════════════════════════════
       COLUMNA 3 — RESULTATS
  ══════════════════════════════════════════════════════ -->
  <rect x="710" y="68" width="200" height="32" rx="8" fill="#1e293b"/>
  <text x="810" y="89" text-anchor="middle" font-size="13" font-weight="600" fill="white">📊 Resultats</text>

  <!-- Barra progrés resultats -->
  <rect x="710" y="112" width="200" height="44" rx="10" fill="white" stroke="#1e293b" stroke-width="2"/>
  <text x="720" y="130" font-size="10" fill="#64748b">Participació: 20/24 avaluats</text>
  <rect x="720" y="135" width="180" height="8" rx="4" fill="#e2e8f0"/>
  <rect x="720" y="135" width="150" height="8" rx="4" fill="#16a34a"/>
  <text x="900" y="143" text-anchor="end" font-size="9" fill="#16a34a">83%</text>

  <!-- Taula resultats -->
  <rect x="710" y="168" width="200" height="144" rx="10" fill="white" stroke="#1e293b" stroke-width="2"/>

  <!-- Capçalera taula -->
  <rect x="710" y="168" width="200" height="22" rx="10" fill="#1e293b"/>
  <rect x="710" y="180" width="200" height="10" fill="#1e293b"/>
  <text x="730" y="183" font-size="9" fill="white" font-weight="600">Alumne</text>
  <text x="820" y="183" text-anchor="middle" font-size="9" fill="#CC0000" font-weight="600">Auto.</text>
  <text x="870" y="183" text-anchor="middle" font-size="9" fill="#94a3b8" font-weight="600">Coav.</text>

  <!-- Files taula -->
  <line x1="710" y1="202" x2="910" y2="202" stroke="#e2e8f0" stroke-width="1"/>
  <text x="720" y="214" font-size="9" fill="#1e293b">1. Garcia, Joan</text>
  <text x="820" y="214" text-anchor="middle" font-size="9" fill="#CC0000" font-weight="600">8.5</text>
  <text x="870" y="214" text-anchor="middle" font-size="9" fill="#475569">7.2</text>

  <line x1="710" y1="220" x2="910" y2="220" stroke="#e2e8f0" stroke-width="1"/>
  <text x="720" y="232" font-size="9" fill="#1e293b">2. Puig, Maria</text>
  <text x="820" y="232" text-anchor="middle" font-size="9" fill="#CC0000" font-weight="600">6.0</text>
  <text x="870" y="232" text-anchor="middle" font-size="9" fill="#475569">8.1</text>

  <line x1="710" y1="238" x2="910" y2="238" stroke="#e2e8f0" stroke-width="1"/>
  <text x="720" y="250" font-size="9" fill="#1e293b">3. López, Pere</text>
  <text x="820" y="250" text-anchor="middle" font-size="9" fill="#CC0000" font-weight="600">9.0</text>
  <text x="870" y="250" text-anchor="middle" font-size="9" fill="#475569">8.8</text>

  <line x1="710" y1="256" x2="910" y2="256" stroke="#e2e8f0" stroke-width="1"/>
  <text x="720" y="268" font-size="9" fill="#1e293b">4. Roca, Anna</text>
  <text x="820" y="268" text-anchor="middle" font-size="9" fill="#CC0000" font-weight="600">5.0</text>
  <text x="870" y="268" text-anchor="middle" font-size="9" fill="#475569">6.5</text>

  <line x1="710" y1="274" x2="910" y2="274" stroke="#e2e8f0" stroke-width="1"/>
  <text x="720" y="286" font-size="9" fill="#1e293b">5. Soler, Marc</text>
  <text x="820" y="286" text-anchor="middle" font-size="9" fill="#CC0000" font-weight="600">7.5</text>
  <text x="870" y="286" text-anchor="middle" font-size="9" fill="#475569">7.8</text>

  <!-- Mini gràfica de barres -->
  <rect x="710" y="322" width="200" height="72" rx="10" fill="white" stroke="#1e293b" stroke-width="2"/>
  <text x="810" y="338" text-anchor="middle" font-size="9" fill="#64748b" font-weight="600">Auto vs Coavaluació per criteri</text>
  <!-- Barres -->
  <rect x="722" y="362" width="10" height="22" rx="2" fill="#CC0000" opacity=".85"/>
  <rect x="734" y="368" width="10" height="16" rx="2" fill="#475569" opacity=".7"/>
  <rect x="754" y="355" width="10" height="29" rx="2" fill="#CC0000" opacity=".85"/>
  <rect x="766" y="360" width="10" height="24" rx="2" fill="#475569" opacity=".7"/>
  <rect x="786" y="358" width="10" height="26" rx="2" fill="#CC0000" opacity=".85"/>
  <rect x="798" y="364" width="10" height="20" rx="2" fill="#475569" opacity=".7"/>
  <rect x="818" y="352" width="10" height="32" rx="2" fill="#CC0000" opacity=".85"/>
  <rect x="830" y="357" width="10" height="27" rx="2" fill="#475569" opacity=".7"/>
  <rect x="850" y="360" width="10" height="24" rx="2" fill="#CC0000" opacity=".85"/>
  <rect x="862" y="363" width="10" height="21" rx="2" fill="#475569" opacity=".7"/>
  <line x1="718" y1="384" x2="882" y2="384" stroke="#e2e8f0" stroke-width="1"/>
  <!-- Llegenda gràfica -->
  <rect x="720" y="387" width="8" height="6" rx="1" fill="#CC0000" opacity=".85"/>
  <text x="731" y="393" font-size="7" fill="#64748b">Auto</text>
  <rect x="755" y="387" width="8" height="6" rx="1" fill="#475569" opacity=".7"/>
  <text x="766" y="393" font-size="7" fill="#64748b">Co</text>

  <!-- Botó CSV -->
  <rect x="710" y="404" width="200" height="0" rx="0" fill="none"/>

  <!-- ══════════════════════════════════════════════════════
       PEU: criteris d'avaluació
  ══════════════════════════════════════════════════════ -->
  <rect x="50" y="376" width="645" height="36" rx="8" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="372" y="390" text-anchor="middle" font-size="10" font-weight="700" fill="#475569">5 Criteris d'avaluació:</text>
  <text x="372" y="405" text-anchor="middle" font-size="10" fill="#64748b">Probitat · Autonomia · Responsabilitat i Treball de qualitat · Col·laboració · Comunicació</text>

  <!-- Definir marcador de fletxa -->
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#94a3b8"/>
    </marker>
  </defs>

  <!-- Línia inferior decorativa -->
  <rect x="50" y="410" width="860" height="4" rx="2" fill="url(#grad)"/>
  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#CC0000"/>
      <stop offset="50%" stop-color="#0ea5e9"/>
      <stop offset="100%" stop-color="#16a34a"/>
    </linearGradient>
  </defs>

</svg>
